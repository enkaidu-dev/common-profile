codex.enter:
  description: Start a clean session with the codex-derived system prompt.
  queries:
    - /session push keep_history=no system_prompt_name="codex.instructions"
    - /toolset load FileManagement
    - /toolset load DateAndTime
    - /toolset load TextEditing
    - /toolset load Web select=[http_get_web_page_as_markdown]

codex.compact:
  description: Prepare a compact checkpoint and reset session and resume using the handoff summary
  queries:
    - /session push
    - /prompt use codex.compact_context
    - /session pop_and_take reset_parent=yes

codex.init:
  description: Generate AGENTS.md in a separate clean session.
  queries:
    - /session push keep_history=no system_prompt_name="codex.instructions"
    - /prompt use codex.init_agents_md
    - /session pop
    - Read AGENTS.md and confirm only that you have done so without further explanation.

codex.leave:
  description: Leave the session you started with `!codex.enter`, taking a compact checkpoint to the outer session.
  queries:
    - "!codex.compact"
    - /session pop_and_take reset_parent=no
