personal.update_daily_memories:
  description: Update Daily Memories Prompt
  template: |
    Please update my daily memories for today based on our conversation.

    ## Instructions

    1. **Check for existing file**: Look for `.personal/memories/[TODAY'S DATE]-memories.md`
      - If it exists, append to it
      - If it doesn't exist, create it with the proper template

    2. **Review deduplication**:
      - Check yesterday's daily memory (if it exists)
      - Check today's daily memory (if it exists)
      - Avoid exact duplicates, but repetition of actions/decisions over time is OK

    3. **Extract from this session**:
      - Actions taken (what was done)
      - Decisions made (what was chosen and why)
      - Changes implemented (what was modified)
      - Lessons learned (insights gained)
      - Problems encountered and solutions
      - New knowledge discovered

    4. **Format each entry**:
      ```markdown
      ## HH:MM - Brief Description

      **Context**: [What was happening]

      **Action**: [What was done]

      **Decision**: [What was decided - include reasoning if significant]

      **Outcome**: [What resulted or what was learned]

      **Tags**: #tag1 #tag2 #subject-name
      ```

    5. **Tag appropriately**:
      - Use existing knowledge subject tags when relevant
      - Create new tags for new subjects (these may become knowledge subjects later)
      - Include technology/tool tags
      - Include task-type tags (debugging, refactoring, learning, etc.)

    6. **Focus on value**:
      - Prioritize "why" over "what"
      - Include context for future understanding
      - Note unexpected outcomes or surprises
      - Capture decision rationale
      - Include enough detail to be useful later, but stay concise

    ## Template for New Daily Memory File

    ```markdown
    # Daily Memory: YYYY-MM-DD

    ## HH:MM - Entry Title

    **Context**:

    **Action**:

    **Decision**:

    **Outcome**:

    **Tags**:

    ---
    ```

    ## After updating:
    - Report what was added
    - Suggest if any entries warrant creating/updating knowledge subjects
    - Suggest if patterns are emerging that should update MEMORY.md

personal.update_durable_memories:
  description: Update Durable Memory (MEMORY.md) Prompt
  template: |
    Please update my durable memory (`MEMORY.md`) based on recent daily memories and knowledge subjects.

    ## Instructions

    1. **Review sources**:
      - Read all daily memories from the last [SPECIFY TIMEFRAME: e.g., "7 days", "30 days", "since last update"]
      - Review all knowledge subjects in `.personal/knowledge/`
      - Check the current `MEMORY.md` to understand what's already captured

    2. **Identify patterns**:
      - Look for recurring themes across multiple daily memories
      - Note repeated actions or decisions
      - Identify trends in learning or problem-solving
      - Recognize evolution in understanding

    3. **Extract key insights**:
      - What are the most important takeaways from recent work?
      - What patterns have emerged?
      - What understanding has evolved or changed?
      - What new areas of knowledge have been developed?

    4. **Update MEMORY.md sections**:

      ### Current Understanding
      - Add new knowledge areas
      - Update existing areas with evolved understanding
      - Cross-reference to knowledge subjects (don't duplicate details)
      - Organize by topic or domain
      - Use format: `**[Area]**: Brief insight → see [knowledge/subject](./knowledge/subject/ABOUT.md)`

      ### Patterns & Trends
      - Identify behavioral patterns (how you work, common approaches)
      - Note technical patterns (recurring solutions, preferred tools)
      - Highlight learning patterns (what helps you learn, what doesn't)
      - Format: Brief description with time context ("Over the last X weeks...")

      ### Open Questions
      - What remains unclear or uncertain?
      - What requires further investigation?
      - What assumptions need testing?
      - Update as questions get answered (move to Current Understanding)

      ### Deprecated Understanding
      - What previous beliefs have changed?
      - What approaches have been abandoned and why?
      - Include date and reason for deprecation
      - Keep for historical context

    5. **Quality checks**:
      - Is each insight actionable or meaningful?
      - Are cross-references accurate?
      - Is it clear without reading all daily memories?
      - Would this be useful 6 months from now?

    6. **Update metadata**:
      - Set "Last Updated" to today's date
      - Ensure INDEX.md reflects any new knowledge subjects

    ## Output Format

    - Update the existing `MEMORY.md` file
    - Preserve existing valuable content
    - Add new sections as needed
    - Remove or archive outdated information that's no longer relevant

    ## After updating:
    - Summarize what was added or changed
    - Note which daily memories were most influential
    - Suggest any knowledge subjects that should be created or updated
    - Identify any open questions that might benefit from focused investigation

    ## Optional Parameters

    You can customize this update by specifying:
    - **Timeframe**: How far back to review daily memories
    - **Focus areas**: Specific subjects or topics to emphasize
    - **Depth**: High-level trends only vs. detailed synthesis

personal.remember_this:
  description: Remember a specific topic or subject
  arguments:
    topic:
      description: What do you want to remember in particular?
  template: |
    Please capture and remember: "{{ arg.topic }}"

    ## Task

    1. **Find in session**: Locate where "{{ arg.topic }}" was discussed in our current conversation
    2. **Extract context**: Gather the relevant context around this topic
    3. **Update daily memory**: Add an entry to today's daily memory file with:
      - What "{{ arg.topic }}" is about
      - Why it's significant
      - Key details or decisions
      - Relevant tags
    4. **Evaluate significance**: Determine if "{{ arg.topic }}" warrants updating durable memory (MEMORY.md)

    ## Criteria for Durable Memory Update

    Update MEMORY.md if "{{ arg.topic }}" is:
    - **Particularly significant**: Major decision, important insight, or critical learning
    - **Sensitive**: Something that should be top-of-mind in future sessions
    - **Pattern-forming**: Relates to recurring themes or established knowledge subjects
    - **High-impact**: Likely to affect future work or decisions

    If updating MEMORY.md, add to the appropriate section with cross-reference to today's daily memory.

    ## Report Back

    - Confirmed what was captured in daily memory
    - Whether MEMORY.md was updated and why (or why not)
    - Suggested tags applied
    - Related knowledge subjects (if any)
