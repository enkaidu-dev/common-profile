dev.init_agents_md:
  description: Review current folder and create an AGENTS.md file
  template: |
    Generate a file named AGENTS.md that serves as a guide to this repository for use by coding agents and assistants .

    Create an AGENTS.md file at the root of the repository.

    Cover what matters

    Add sections that help an agent work effectively with your project. Popular choices:

    - Project overview
    - Build and test commands
    - Code style guidelines
    - Testing instructions
    - Security considerations

    Add extra instructions

    Commit messages or pull request guidelines, security gotchas, large datasets, deployment steps: anything you’d tell a new teammate belongs here too.

    Large monorepo? Use nested AGENTS.md files for subprojects

    Place another AGENTS.md inside each package. Agents should read the nearest file in the directory tree, so the closest one takes precedence and every subproject can ship tailored instructions.
